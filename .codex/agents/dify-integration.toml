## Error Patterns & Solutions

### Pattern 1: 404 "Conversation Not Exists"

**Symptoms**:
```
Dify API error: {"code":"not_found","message":"Conversation Not Exists.","status":404}
```

**Root Cause**: Stored conversation_id has expired on Dify instance

**Solution**:
1. **Immediate**: Run `clear-all-conversation-ids.ts` script
2. **Permanent**: Ensure 404 error recovery is implemented (Rule 2)
3. **Verify**: Check debug logs to confirm conversation_id handling

**Prevention**: Implement automatic 404 recovery in API route

---

### Pattern 2: Missing API Configuration

**Symptoms**:
```
Dify API not configured
```
or
```
Dify API key not configured
```

**Root Cause**: dify_api_url or dify_api_key is empty in database

**Solution**:
1. **Immediate**: Run `add-dify-url.ts` script
2. **Verify**: Add API key to database config
3. **Fallback**: Ensure environment variables are set

**Prevention**: Always provide fallback to environment variables (Rule 4)

---

### Pattern 3: Wrong API Key for Bot

**Symptoms**:
```
401 Unauthorized
```
or
```
Invalid API Key
```

**Root Cause**: Using global API key instead of bot-specific key

**Solution**:
1. **Debug**: Check logs for which bot is being used
2. **Verify**: Run `verify-dify-config.ts` to test all bot keys
3. **Fix**: Implement bot-specific API key selection (Rule 3)

**Prevention**: Always select API key based on chat.model

---

### Pattern 4: Rating Parameter Errors

**Symptoms**:
```
400 Bad Request - Invalid inputs
```

**Root Cause**: Sending rating parameter to bot that doesn't support it

**Solution**:
```typescript
const inputs: Record<string, any> = {};
if (rating) {
  inputs.rating = rating;
} else if (botConfig && botConfig.has_rating && botConfig.ratings && botConfig.ratings.length > 0) {
  // Only use default rating if bot has rating feature
  inputs.rating = botConfig.default_rating || botConfig.ratings[0];
}
// If bot doesn't have rating feature, don't send it at all
```

**Prevention**: Check bot.has_rating before including rating in inputs

---

### Pattern 5: SSE Streaming Issues

**Symptoms**:
- Messages not appearing in real-time
- UI updates are jerky/slow
- Browser console errors

**Root Cause**:
- Not batching UI updates
- Parsing SSE incorrectly
- Not handling stream errors

**Solution**:
```typescript
// Use ref to avoid re-renders during streaming
const contentBufferRef = useRef<string>('');

// Schedule updates to batch UI changes
const scheduleUpdate = useCallback(() => {
  if (rafIdRef.current === null) {
    rafIdRef.current = requestAnimationFrame(() => {
      setMessages(prev => [...prev, { content: contentBufferRef.current }]);
      rafIdRef.current = null;
    });
  }
}, []);
```

**Prevention**: Always use requestAnimationFrame for streaming UI updates

