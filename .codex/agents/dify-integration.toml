## Critical Rules (From AGENTS.md)

### Rule 1: Never Send Empty conversation_id

❌ **WRONG**:
```typescript
const difyResponse = await fetch(`${difyApiUrl}/v1/chat-messages`, {
  body: JSON.stringify({
    inputs,
    query,
    response_mode: 'streaming',
    conversation_id: conversationId,  // Always sent, even if empty!
    user: user.id,
    files: [],
  }),
});
```

✅ **CORRECT**:
```typescript
const requestBody: Record<string, any> = {
  inputs,
  query,
  response_mode: 'streaming',
  user: user.id,
  files: [],
};

// Only include conversation_id if it exists and is not empty
if (conversationId && conversationId.trim()) {
  requestBody.conversation_id = conversationId;
  console.log('[DEBUG] Using existing conversation_id:', conversationId);
} else {
  console.log('[DEBUG] Starting new conversation (no conversation_id)');
}
```

**Why**: Dify API returns 404 if you send empty string as conversation_id.

### Rule 2: Always Handle 404 with Recovery

```typescript
if (!difyResponse.ok) {
  const errorText = await difyResponset();
  console.error('Dify API error:', errorText);

  // Special handling for 404 conversation not found error
  if (difyResponse.status === 404 && conversationId) {
    console.log('[DEBUG] Conversation not found, clearing invalid conversation_id...');

    try {
      // Clear the invalid conversation_id from database
      await updateChat(chatId, {
        metadata: JSON.stringify({
          ...chatMetadata,
          dify_conversation_id: undefined,
        }),
      });

      console.log('[DEBUG] Conversation_id cleared. User should retry.');
    } catch (e) {
      console.error('[DEBUG] Failed to clear conversation_id:', e);
    }

    // Return user-friendly error
    return new Response(
      JSON.stringify({
        error: 'conversation_not_found',
        message: 'The conversation has expired. A new conversation will be created when you send your message again.',
      }),
      { status: 404 }
    );
  }

  return new Response(`Dify API error: ${errorText}`, { status: difyResponse.status });
}
```

**Why**: Automatically clear expired conversation IDs and allow user to retry without manual intervention.

### Rule 3: Use Bot-Specific API Keys

```typescript
// Determine which bot's API key to use based on chat.model
let difyApiKey = configs.dify_api_key; // Fallback to global key
let botConfig = null;

if (chat.model && chat.model.startsWith('dify/')) {
  const botId = chat.model.replace('dify/', '');

  try {
    const difyBotsConfig = configs.dify_bots;
    if (difyBotsConfig) {
      const bots = JSON.parse(difyBotsConfig);
      botConfig = bots.find((b: any) => b.id === botId);

      if (botConfig && botConfig.api_key) {
        difyApiKey = botConfig.api_key;
        console.log('[DEBUG] Using bot API key for:', botConfig.title);
      }
    }
  } catch (e) {
    console.error('[DEBUG] Failed to parse dify_bots config:', e);
  }
}
```

**Why**: Each bot may have different API key. Always select based on `chat.model`.

### Rule 4: Always Provide Fallback for API URL

```typescript
const difyApiUrl = configs.dify_api_url || process.env.DIFY_API_URL;

if (!difyApiUrl) {
  return new Response('Dify API not configured', { status: 500 });
}
```

**Why**: Database config might be empty. Environment variable provides fallback.

### Rule 5: Include Comprehensive Debug Logging

```typescript
console.log('[DEBUG POST /api/dify/chat] Chat ID:', chatId);
console.log('[DEBUG POST /api/dify/chat] Chat Model:', chat.model);
console.log('[DEBUG POST /api/dify/chat] Conversation ID:', conversationId || '(empty)');
console.log('[DEBUG POST /api/dify/chat] Using bot:', botConfig?.title || 'default');
console.log('[DEBUG POST /api/dify/chat] API Key:', difyApiKey.substring(0, 15) + '...');
console.log('[DEBUG POST /api/dify/chat] API URL:', difyApiUrl);
```

**Why**: Critical for diagnosing issues. Follow format: `[DEBUG ROUTE] key: value`

