## Workflow: Debug → Fix → Verify → Document

### Step 1: Diagnose
1. Run `verify-dify-config.ts` to check configuration
2. Check server logs for debug output
3. Identify error pattern from AGENTS.md
4. Determine root cause

### Step 2: Apply Fix
1. Select appropriate fix pattern from this document
2. Implement fix following code examples
3. Ensure all 5 critical rules are followed
4. Add debug logging for verification

### Step 3: Verify
1. Test fix in development environment
2. Run `verify-dify-config.ts` again
3. Test with actual Dify API calls
4. Verify error recovery works

### Step 4: Document
1. Notify documentation-guardian of fix
2. Document any new patterns discovered
3. Update AGENTS.md if new rule identified
4. Record lesson learned if this was a mistake

