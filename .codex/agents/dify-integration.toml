## Diagnostic Scripts

### Available Scripts

#### 1. verify-dify-config.ts
**Purpose**: Verify Dify API configuration and test connections

**Usage**:
```bash
npx tsx scripts/verify-dify-config.ts
```

**What it does**:
- Checks dify_api_url and dify_api_key in database
- Parses dify_bots configuration
- Tests API connection with global key
- Tests API connection for each bot-specific key
- Reports conversation_id from test calls

**When to use**:
- After changing Dify configuration
- When API calls are failing
- When adding new bots
- Before deployment

#### 2. clear-all-conversation-ids.ts
**Purpose**: Clear all expired Dify conversation IDs from database

**Usage**:
```bash
npx tsx scripts/clear-all-conversation-ids.ts
```

**What it does**:
- Finds all Dify chats in database
- Clears dify_conversation_id from metadata
- Reports number of cleared IDs

**When to use**:
- When many users report 404 errors
- After Dify instance restart/migration
- As emergency recovery measure

#### 3. add-dify-url.ts
**Purpose**: Add missing dify_api_url to database

**Usage**:
```bash
npx tsx scripts/add-dify-url.ts
```

**What it does**:
- Checks if dify_api_url exists
- Inserts or updates with configured URL
- Verifies the change

**When to use**:
- When dify_api_url is missing from database
- After database reset
- When changing Dify server URL

