    - data:
        code: "import re\nimport json\n\ndef main(arg1: str, arg2: str) -> dict:\n\
          \    try:\n        json_start = arg1.find('{')\n        json_end = arg1.rfind('}')\n\
          \        json_content = arg1[json_start:json_end + 1]\n        json_data\
          \ = json.loads(json_content)\n        question1 = json_data.get(\"question\"\
          )\n        part_number = json_data.get(\"part_number\")\n    except:\n \
