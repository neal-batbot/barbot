    - data:
        code: "import requests\nimport json\n\ndef main(rag_res1, rag_res2, rag_res3)\
          \ -> dict:\n    total_revival_list = []\n    tmp_result = []\n    final_result\
          \ = []\n    seg_set = set()\n    total_revival_list = rag_res1 + rag_res2\
          \ + rag_res3\n    id_score_dict = {}\n    best_item_by_id = {}\n\n    for\
          \ item in total_revival_list:\n        seg_id = item['metadata']['segment_id']\n\
          \        score = item['metadata']['score']\n        \n        if seg_id\
          \ not in best_item_by_id or score > best_item_by_id[seg_id]['metadata']['score']:\n\
          \            best_item_by_id[seg_id] = item\n    \n    tmp_result = list(best_item_by_id.values())\n\
          \    id_score_dict = {seg_id: item['metadata']['score'] for seg_id, item\
          \ in best_item_by_id.items()}\n\n    final_str = \"\"\n    top_five_keys\
          \ = sorted(id_score_dict, key = id_score_dict.get, reverse=True)[:6]\n \
          \   count = 1\n\n    parent_retrieval_param = []\n    \n    for tmp_id in\
          \ top_five_keys:  \n        for item in tmp_result:\n            seg_pos\
          \ = item['metadata']['segment_position']\n            doc_id = item['metadata']['document_id']\n\
          \            seg_id = item['metadata']['segment_id']\n            title\
          \ = item['title']\n            content = item['content']\n            \n\
          \            if seg_id == tmp_id:\n                tmp = [seg_pos, doc_id,\
          \ title]\n                parent_retrieval_param.append(tmp)\n         \
          \       final_result.append(item)\n                tmp_str = \"Retriveal\
          \ Documents:\\n\" + str(count) + \"\\nTitle：\" + title + \"\\n\" + \"Content：\"\
          \ + content + \"\\n\\n\"\n                final_str += tmp_str\n       \
          \         count += 1\n    return {'result': final_result, \"final_str\"\
          :final_str, 'parent_retrieval_param': json.dumps(parent_retrieval_param)}"
