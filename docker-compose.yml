# 本地 Docker 启动模板（生产请使用密钥管理系统注入环境变量）
services:
  app:
    build: .
    network_mode: "host"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "${DATABASE_URL}"
      DATABASE_PROVIDER: "${DATABASE_PROVIDER:-postgresql}"
      DB_SINGLETON_ENABLED: "${DB_SINGLETON_ENABLED:-true}"
      DB_MAX_CONNECTIONS: "${DB_MAX_CONNECTIONS:-10}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
      DIFY_API_URL: "${DIFY_API_URL}"
      DIFY_API_KEY: "${DIFY_API_KEY}"
      AUTH_SECRET: "${AUTH_SECRET}"
      RATE_LIMIT_IP_WINDOW_MS: "${RATE_LIMIT_IP_WINDOW_MS:-60000}"
      RATE_LIMIT_IP_MAX: "${RATE_LIMIT_IP_MAX:-60}"
      RATE_LIMIT_USER_WINDOW_MS: "${RATE_LIMIT_USER_WINDOW_MS:-60000}"
      RATE_LIMIT_USER_MAX: "${RATE_LIMIT_USER_MAX:-40}"
      RATE_LIMIT_DAILY_USER_MAX: "${RATE_LIMIT_DAILY_USER_MAX:-800}"
